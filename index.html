<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

.page{
  position:absolute;
  inset:0;
  opacity:0;
}

.page.active{opacity:1}

.container{
  padding:20px;
  height:100%;
}

.widget{
  width:100%;
  height:100%;
  border-radius:24px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  height:72px;
  display:flex;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(16px);
  border-radius:30px;
}

.pill{
  position:absolute;
  width:33.3%;
  height:100%;
  background:rgba(255,255,255,.06);
  transition:.35s;
}

.pill.stock{transform:translateX(0);}
.pill.settings{transform:translateX(100%);}
.pill.news{transform:translateX(200%);}

.tab{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:2;
}

.icon{font-size:20px}
.label{font-size:11px}

.settings{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  padding:14px;
  background:rgba(255,255,255,.05);
  border-radius:24px;
  display:none;
}

.settings.show{display:block}

.row{display:flex}
.btn{
  flex:1;
  padding:12px;
  background:rgba(255,255,255,.06);
  margin:5px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- STOCK -->
<div class="page active" id="stock">

<div class="container">

<div class="widget">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
"symbols":[["ASX:XJO|1D"]],
"chartOnly":false,
"colorTheme":"dark",
"isTransparent":true,
"autosize":true
}
</script>

</div>

</div>

</div>

</div>

<!-- NEWS -->
<div class="page" id="news">

<div class="container">

<div class="widget">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
"feedMode":"all_symbols",
"colorTheme":"dark",
"isTransparent":true,
"height":"100%",
"width":"100%"
}
</script>

</div>

</div>

</div>

</div>

<!-- SETTINGS -->
<div class="settings" id="settingsPanel">

<div class="row">
<div class="btn" onclick="dark()">Dark</div>
<div class="btn" onclick="light()">Light</div>
</div>

</div>

<!-- NAV -->
<div class="nav">

<div class="pill stock" id="pill"></div>

<div class="tab" onclick="go('stock')">📈</div>
<div class="tab" onclick="toggleSettings()">⚙️</div>
<div class="tab" onclick="go('news')">📰</div>

</div>

<script>

function go(page){

document.getElementById("stock").classList.remove("active");
document.getElementById("news").classList.remove("active");

document.getElementById(page).classList.add("active");

document.getElementById("pill").className="pill "+page;

document.getElementById("settingsPanel").classList.remove("show");

}

function toggleSettings(){
document.getElementById("settingsPanel").classList.toggle("show");
}

function dark(){
document.body.classList.remove("light");
}

function light(){
document.body.classList.add("light");
}

</script>

</body>
</html>
