<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

/* =====================================================
   GLOBAL
===================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:white;
  overflow:hidden;
}

/* =====================================================
   MAIN GRID LAYOUT
===================================================== */
.app{

  width:100vw;
  height:100vh;

  display:grid;

  /* CHART BIG + NEWS THIN */
  grid-template-columns: 3fr 1fr;

  gap:12px;

  padding:12px;

}

/* =====================================================
   PANELS
===================================================== */
.panel{

  background:#141414;

  border-radius:22px;

  overflow:hidden;

  position:relative;

}

/* =====================================================
   STOCK (BIG LEFT)
===================================================== */
.stock-panel{
  grid-column:1;
}

/* =====================================================
   NEWS (THIN RIGHT)
===================================================== */
.news-panel{
  grid-column:2;

  display:flex;
  flex-direction:column;

  overflow:hidden;

}

/* =====================================================
   NEWS SCROLL STYLE
===================================================== */
.news-panel .widget{

  height:100%;

}

/* =====================================================
   TRADINGVIEW FIX
===================================================== */
iframe{
  border:none !important;
}

/* =====================================================
   SUBTLE GLASS LAYER
===================================================== */
.panel::before{

  content:"";

  position:absolute;

  inset:0;

  background:rgba(255,255,255,.02);

  pointer-events:none;

}

</style>
</head>

<body>

<div class="app">

  <!-- =====================================================
       STOCK (BIG AREA)
  ====================================================== -->
  <div class="panel stock-panel">

    <div class="widget">

      <div class="tradingview-widget-container"
      style="height:100%;width:100%;">

        <div class="tradingview-widget-container__widget"
        style="height:100%;width:100%;"></div>

        <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
        async>

        {
          "symbols":[["ASX:XJO|1D"]],
          "chartOnly":false,
          "colorTheme":"dark",
          "isTransparent":true,
          "autosize":true,
          "width":"100%",
          "height":"100%",
          "hideSymbolLogo":false,
          "scalePosition":"right",
          "scaleMode":"Normal",
          "valuesTracking":"1",
          "changeMode":"price-and-percent"
        }

        </script>

      </div>

    </div>

  </div>

  <!-- =====================================================
       NEWS (THIN COLUMN)
  ====================================================== -->
  <div class="panel news-panel">

    <div class="widget">

      <div class="tradingview-widget-container"
      style="height:100%;width:100%;">

        <div class="tradingview-widget-container__widget"
        style="height:100%;width:100%;"></div>

        <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
        async>

        {
          "feedMode":"all_symbols",
          "colorTheme":"dark",
          "isTransparent":true,
          "displayMode":"compact",
          "width":"100%",
          "height":"100%",
          "locale":"en"
        }

        </script>

      </div>

    </div>

  </div>

</div>

</body>
</html>
