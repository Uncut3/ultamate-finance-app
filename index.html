<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

/* =====================================================
   GLOBAL
===================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* =====================================================
   LAYOUT
===================================================== */
.app{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
  padding:14px;
}

/* =====================================================
   PANELS
===================================================== */
.panel{
  background:#141414;
  border-radius:24px;
  overflow:hidden;
  position:relative;
}

/* =====================================================
   STOCK PANEL
===================================================== */
.stock-panel{
  grid-column:1;
  grid-row:1 / span 2;
}

/* =====================================================
   NEWS PANEL
===================================================== */
.news-panel{
  grid-column:2;
  grid-row:1 / span 2;
}

/* =====================================================
   WIDGET
===================================================== */
.widget{
  width:100%;
  height:100%;
}

/* remove borders */
iframe{
  border:none !important;
}

/* =====================================================
   CLEAN GLASS EFFECT (optional subtle overlay)
===================================================== */
.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.02);
  pointer-events:none;
}

</style>
</head>

<body>

<div class="app">

  <!-- =====================================================
       STOCK PANEL
  ====================================================== -->
  <div class="panel stock-panel">

    <div class="widget">

      <div class="tradingview-widget-container"
      style="height:100%;width:100%;">

        <div class="tradingview-widget-container__widget"
        style="height:100%;width:100%;"></div>

        <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
        async>

        {
          "symbols":[["ASX:XJO|1D"]],
          "chartOnly":false,
          "colorTheme":"dark",
          "isTransparent":true,
          "autosize":true,
          "width":"100%",
          "height":"100%",
          "hideSymbolLogo":false,
          "scalePosition":"right",
          "scaleMode":"Normal",
          "fontFamily":"-apple-system, BlinkMacSystemFont, sans-serif",
          "valuesTracking":"1",
          "changeMode":"price-and-percent"
        }

        </script>

      </div>

    </div>

  </div>

  <!-- =====================================================
       NEWS PANEL
  ====================================================== -->
  <div class="panel news-panel">

    <div class="widget">

      <div class="tradingview-widget-container"
      style="height:100%;width:100%;">

        <div class="tradingview-widget-container__widget"
        style="height:100%;width:100%;"></div>

        <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
        async>

        {
          "feedMode":"all_symbols",
          "colorTheme":"dark",
          "isTransparent":true,
          "displayMode":"regular",
          "width":"100%",
          "height":"100%",
          "locale":"en"
        }

        </script>

      </div>

    </div>

  </div>

</div>

</body>
</html>
