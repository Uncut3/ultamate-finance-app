<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

/* =====================================================
   BASE
===================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* =====================================================
   LAYOUT
===================================================== */
.app{
  width:100vw;
  height:100vh;
  position:relative;
  padding:12px;
}

/* =====================================================
   STOCK (MAIN CHART)
===================================================== */
.stock-panel{
  position:absolute;
  top:12px;
  left:12px;
  right:344px;
  bottom:12px;

  border-radius:24px;
  overflow:hidden;

  background:#141414;
}

/* =====================================================
   NEWS PANEL (SIDE)
===================================================== */
.news-panel{
  position:absolute;
  top:12px;
  right:12px;

  width:320px;
  height:calc(100vh - 24px);

  border-radius:20px;
  overflow:hidden;

  background:#141414;
}

/* =====================================================
   CHART FIX
===================================================== */
iframe{
  border:none !important;
}

</style>
</head>

<body>

<div class="app">

<!-- STOCK -->
<div class="stock-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
  "symbols":[["ASX:XJO|1D"]],
  "chartOnly":false,
  "colorTheme":"dark",
  "isTransparent":true,
  "autosize":true
}
</script>

</div>

</div>

<!-- NEWS -->
<div class="news-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
  "feedMode":"all_symbols",
  "colorTheme":"dark",
  "isTransparent":true,
  "displayMode":"regular",
  "width":"100%",
  "height":"100%"
}
</script>

</div>

</div>

</div>

</body>
</html>
