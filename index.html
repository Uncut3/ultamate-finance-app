<!DOCTYPE html>
<html>
<head>
<title>AWP Desktop</title>

<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.panel {
  padding: 10px;
}

iframe, .widget {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">

  <!-- STOCK -->
  <div class="panel">
    <h2>ASX 200 (XJO)</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"></script>
  </div>

  <!-- NEWS -->
  <div class="panel">
    <h2>Australia News</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"></script>
  </div>

</div>

</body>
</html>
