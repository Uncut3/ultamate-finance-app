<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>
body {
  margin: 0;
  background: #141414;
  color: #d0d0d0;
  font-family: Arial;
}

/* REMOVE ALL BORDERS */
* {
  border: none !important;
  outline: none !important;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  height: 100vh;
  gap: 0;
}

/* PANELS */
.panel {
  background: #141414;
  padding: 12px;
  overflow: hidden;
}

/* RIGHT STACK */
.stack {
  display: grid;
  grid-template-rows: 1fr 1fr;
  height: 100%;
}

.title {
  font-size: 13px;
  color: #9a9a9a;
  margin-bottom: 8px;
}

</style>
</head>

<body>

<div class="container">

  <div class="panel">
    <div class="title">ASX 200 (XJO)</div>
    <div id="stockContainer"></div>
  </div>

  <div class="panel stack">

    <div>
      <div class="title">Australia News</div>
      <div id="newsContainer"></div>
    </div>

    <div>
      <div class="title">Market Overview</div>
      <div id="extraContainer"></div>
    </div>

  </div>

</div>

<script>

function loadStock() {
  const c = document.getElementById("stockContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

function loadNews() {
  const c = document.getElementById("newsContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

function loadExtra() {
  const c = document.getElementById("extraContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    width: "100%",
    height: "100%",
    colorTheme: "dark",
    showChart: true
  });

  c.appendChild(s);
}

loadStock();
loadNews();
loadExtra();

</script>

</body>
</html>
