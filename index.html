<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP</title>

<style>
.news-panel{
  position:absolute;
  top:12px;
  right:12px;

  width:320px;
  height:calc(100vh - 24px);

  border-radius:20px;
  overflow:hidden;
}

.stock-panel{
  position:absolute;
  top:12px;
  left:12px;

  right:344px; /* 320 + 24px gap */

  bottom:12px;

  border-radius:24px;
  overflow:hidden;
}
</style>

</head>

<body>

<div class="app">

<div class="stock-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
  "symbols":[["ASX:XJO|1D"]],
  "chartOnly":false,
  "colorTheme":"dark",
  "isTransparent":true,
  "autosize":true
}
</script>

</div>

</div>

<div class="news-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
  "feedMode":"all_symbols",
  "colorTheme":"dark",
  "isTransparent":true,
  "displayMode":"regular",
  "width":"100%",
  "height":"100%"
}
</script>

</div>

</div>

</div>

</body>
</html>
