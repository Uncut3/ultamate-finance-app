<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

/* =========================================================
   GLOBAL
========================================================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  border:none;
  outline:none;
}

body{
  background:#141414;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
  color:white;
}

/* =========================================================
   APP
========================================================= */
.app{
  width:100vw;
  height:100vh;
}

/* =========================================================
   PAGES
========================================================= */
.page{
  position:absolute;
  inset:0;

  opacity:0;
  pointer-events:none;

  transition:opacity .28s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* =========================================================
   LAYOUT
========================================================= */
.layout{
  width:100%;
  height:100%;
  padding:20px 20px 100px 20px;
}

/* =========================================================
   WIDGET
========================================================= */
.widget{
  width:100%;
  height:100%;
  background:#141414;
  opacity:.55;
  border-radius:24px;
}

/* =========================================================
   🍏 NAV
========================================================= */
.nav{
  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:18px;

  width:420px;
  height:72px;

  display:flex;
  align-items:center;

  gap:.5em;

  padding:.5em;

  border-radius:30px;

  border:1px solid rgba(255,255,255,.14);

  background:rgba(255,255,255,.06);

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  box-shadow:
    inset 0 0 8px 1px rgba(255,255,255,.08),
    0 10px 30px rgba(0,0,0,.55);

  overflow:hidden;

  z-index:9999;
}

/* ACTIVE PILL */
.active-pill{
  position:absolute;

  left:8px;

  width:calc(50% - 8px);
  height:56px;

  border-radius:22px;

  background:rgba(255,255,255,.08);

  box-shadow:
    inset 0 0 6px rgba(255,255,255,.08);

  transition:
    transform .35s cubic-bezier(.22,1,.36,1);

  z-index:0;
}

.active-pill.news{
  transform:translateX(100%);
}

/* =========================================================
   TABS
========================================================= */
.tab{
  flex:1;

  height:100%;

  position:relative;
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  border-radius:22px;

  color:rgba(255,255,255,.6);

  transition:
    transform .22s ease,
    color .22s ease;

  user-select:none;
}

.tab.active{
  color:white;
}

.tab:hover{
  transform:translateY(-1px);
}

.tab:active{
  transform:scale(.96);
}

.icon{
  font-size:22px;

  transition:transform .25s ease;
}

.tab.active .icon{
  transform:
    translateY(-1px)
    scale(1.08);
}

.label{
  margin-top:4px;
  font-size:11px;
}

</style>
</head>

<body>

<div class="app">

  <!-- STOCK -->
  <div class="page active" id="stockPage">
    <div class="layout">
      <div class="widget"></div>
    </div>
  </div>

  <!-- NEWS -->
  <div class="page" id="newsPage">
    <div class="layout">
      <div class="widget"></div>
    </div>
  </div>

  <!-- 🍏 NAV -->
  <div class="nav">

    <div class="active-pill" id="pill"></div>

    <div class="tab active" id="stockTab" onclick="switchPage('stock')">
      <div class="icon">📈</div>
      <div class="label">Stock</div>
    </div>

    <div class="tab" id="newsTab" onclick="switchPage('news')">
      <div class="icon">📰</div>
      <div class="label">News</div>
    </div>

  </div>

</div>

<script>

function switchPage(page){

  const stockPage=document.getElementById("stockPage");
  const newsPage=document.getElementById("newsPage");

  const stockTab=document.getElementById("stockTab");
  const newsTab=document.getElementById("newsTab");

  const pill=document.getElementById("pill");

  stockTab.classList.remove("active");
  newsTab.classList.remove("active");

  if(page==="stock"){

    stockPage.classList.add("active");
    newsPage.classList.remove("active");

    stockTab.classList.add("active");

    pill.classList.remove("news");

  }else{

    newsPage.classList.add("active");
    stockPage.classList.remove("active");

    newsTab.classList.add("active");

    pill.classList.add("news");

  }

}

</script>

</body>
</html>
