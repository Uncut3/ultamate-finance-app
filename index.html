<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99999;

  opacity:1;
  transition:opacity 0.4s ease;
}

.logo{
  width:80px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

/* APP */
.app{
  width:100vw;
  height:100vh;
  position:relative;
  padding:12px;
}

/* STOCK PANEL */
.stock-panel{
  position:absolute;
  top:12px;
  left:12px;
  right:344px;
  bottom:12px;

  border-radius:24px;
  overflow:hidden;
}

/* NEWS PANEL */
.news-panel{
  position:absolute;
  top:12px;
  right:12px;
  width:320px;
  height:calc(100vh - 24px);

  border-radius:20px;
  overflow:hidden;
}

/* FORCE FULL SIZE */
.stock-panel,
.stock-panel > div,
.tradingview-widget-container{
  width:100% !important;
  height:100% !important;
}

iframe{
  border:none !important;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon.png" alt="logo">
</div>

<div class="app">

  <!-- STOCK -->
  <div class="stock-panel">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
      {
        "symbols":[["ASX:XJO|1D"]],
        "chartOnly":true,
        "colorTheme":"dark",
        "isTransparent":true,
        "autosize":true
      }
      </script>

    </div>
  </div>

  <!-- NEWS -->
  <div class="news-panel">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%"
      }
      </script>

    </div>
  </div>

</div>

<!-- JS (LOADER FIX) -->
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
    }, 400);

  }, 800);
});
</script>

</body>
</html>
