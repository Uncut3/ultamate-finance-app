<!DOCTYPE html>
<html>
<head>
<title>AWP Desktop</title>

<style>
body {
  margin: 0;
  background: #000000;
  color: #d0d0d0;
  font-family: Arial;
}

/* CLEAN GRID (NO BORDERS) */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  gap: 0;
  padding: 10px;
  box-sizing: border-box;
}

.panel {
  background: #0a0a0a;
  padding: 10px;
}

h2 {
  margin: 0 0 10px 0;
  color: #cfcfcf;
  font-weight: 400;
}
</style>
</head>

<body>

<div class="container">

  <div class="panel">
    <h2>ASX 200 (XJO)</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"></script>
  </div>

  <div class="panel">
    <h2>Australia Market News</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"></script>
  </div>

</div>

</body>
</html>
