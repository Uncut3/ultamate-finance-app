<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* LAYOUT */
.app{
  width:100vw;
  height:100vh;
  position:relative;
  padding:12px;
}

/* STOCK (BIG) */
.stock-panel{
  position:absolute;
  top:12px;
  left:12px;
  right:344px;
  bottom:12px;
  border-radius:24px;
  overflow:hidden;
  background:#141414;
}

/* NEWS (SIDE) */
.news-panel{
  position:absolute;
  top:12px;
  right:12px;
  width:320px;
  height:calc(100vh - 24px);
  border-radius:20px;
  overflow:hidden;
}

/* CHART */
iframe{border:none !important}

/* =====================================================
   ⚙️ SETTINGS BUTTON (ADDED ONLY)
===================================================== */
.settings-btn{
  position:absolute;
  top:16px;
  right:16px;

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:18px;

  background:rgba(255,255,255,.06);
  backdrop-filter:blur(14px);

  border-radius:14px;

  cursor:pointer;

  z-index:9999;
}

/* =====================================================
   SETTINGS PANEL (ADDED ONLY)
===================================================== */
.settings-panel{
  position:absolute;
  top:70px;
  right:16px;

  width:200px;

  padding:12px;

  border-radius:18px;

  background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);

  display:none;

  z-index:9999;
}

.settings-panel.show{
  display:block;
}

.row{
  display:flex;
  gap:6px;
}

.btn{
  flex:1;
  padding:10px;
  margin:4px;

  background:rgba(255,255,255,.08);

  border-radius:10px;

  text-align:center;

  cursor:pointer;

  user-select:none;
}

/* LIGHT MODE */
body.light{
  background:#f2f2f2;
  color:#111;
}

body.light .settings-btn,
body.light .settings-panel{
  background:rgba(0,0,0,.06);
}

body.light .btn{
  background:rgba(0,0,0,.08);
  color:#111;
}

</style>
</head>

<body>

<div class="app">

<!-- =========================
     ⚙️ SETTINGS BUTTON
========================= -->
<div class="settings-btn" onclick="toggleSettings()">⚙️</div>

<!-- =========================
     SETTINGS PANEL
========================= -->
<div class="settings-panel" id="settingsPanel">

  <div class="row">
    <div class="btn" onclick="setDark()">Dark</div>
    <div class="btn" onclick="setLight()">Light</div>
  </div>

</div>

<!-- STOCK -->
<div class="stock-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
"symbols":[["ASX:XJO|1D"]],
"chartOnly":false,
"colorTheme":"dark",
"isTransparent":true,
"autosize":true
}
</script>

</div>

</div>

<!-- NEWS -->
<div class="news-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
"feedMode":"all_symbols",
"colorTheme":"dark",
"isTransparent":true,
"displayMode":"regular",
"width":"100%",
"height":"100%"
}
</script>

</div>

</div>

</div>

<!-- =========================
     SETTINGS SCRIPT
========================= -->
<script>

function toggleSettings(){
  document.getElementById("settingsPanel")
    .classList.toggle("show");
}

function setDark(){
  document.body.classList.remove("light");
}

function setLight(){
  document.body.classList.add("light");
}

</script>

</body>
</html>
