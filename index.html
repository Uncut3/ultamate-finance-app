<style>

/* =====================================================
   MAIN LAYOUT
===================================================== */
.app{
  width:100vw;
  height:100vh;
  position:relative;
  padding:12px;
}

/* =====================================================
   STOCK (FULL HEIGHT FOCUS)
===================================================== */
.stock-panel{
  position:absolute;
  top:12px;
  left:12px;

  right:260px; /* bigger chart */

  bottom:12px;

  border-radius:24px;
  overflow:hidden;

  z-index:1; 
}

/* =====================================================
   NEWS PANEL (SIDE)
===================================================== */
.news-panel{
  position:absolute;
  top:12px;
  right:12px;

  width:320px;
  height:calc(100vh - 24px);

  border-radius:20px;
  overflow:hidden;

  z-index:2;
}

/* =====================================================
   CLEAN WIDGET FIX
===================================================== */
iframe{
  border:none !important;
}

/* subtle glass overlay */
.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.02);
  pointer-events:none;
}

</style>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>


</head>

<body>

<div class="app">

<!-- STOCK -->
<div class="stock-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
  "symbols":[["ASX:XJO|1D"]],
  "chartOnly":false,
  "colorTheme":"dark",
  "isTransparent":true,
  "autosize":true
}
</script>

</div>

</div>

<!-- NEWS -->
<div class="news-panel">

<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
  "feedMode":"all_symbols",
  "colorTheme":"dark",
  "isTransparent":true,
  "displayMode":"regular",
  "width":"100%",
  "height":"100%"
}
</script>

</div>

</div>

</div>

</body>
</html>
