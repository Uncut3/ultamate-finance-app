<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Desktop Sidebar</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #dbeafe, #fce7f3);
  }

  /* iOS-style sidebar */
  .sidebar {
    width: 260px;
    height: 100vh;
    padding: 20px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.4);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .item {
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    color: #444;
  }

  .item:hover {
    background: rgba(255,255,255,0.5);
  }

  .item.active {
    background: rgba(255,255,255,0.7);
    color: #000;
  }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">My App</div>

  <div class="item active" onclick="setActive(this)">🏠 Home</div>
  <div class="item" onclick="setActive(this)">🔍 Search</div>
  <div class="item" onclick="setActive(this)">👤 Profile</div>
  <div class="item" onclick="setActive(this)">⚙️ Settings</div>
</div>

<div class="main">
  <div>
    <h1>Desktop Version</h1>
    <p>iOS-style sidebar layout</p>
  </div>
</div>

<script>
function setActive(el) {
  document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
