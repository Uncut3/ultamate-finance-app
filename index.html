<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XJO Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* HEIGHT FIX */
html, body{
  height:100%;
}

/* BODY */
body{
  background:#141414;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:99999;
  opacity:1;
  transition:opacity 0.4s ease;
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* APP LAYOUT */
.app{
  width:100vw;
  height:100vh;

  display:flex;
  gap:12px;
  padding:12px;

  align-items:stretch;
}

/* STOCK */
.stock-panel{
  flex:1;
  height:100%;

  border-radius:24px;
  overflow:hidden;

  min-width:0;
  min-height:0;
}

/* NEWS */
.news-panel{
  width:320px;
  height:100%;

  border-radius:20px;
  overflow:hidden;

  min-width:0;
  min-height:0;
}

/* TRADINGVIEW */
.tradingview-widget-container{
  width:100%;
  height:100%;
  min-height:100%;
}

/* SAFETY */
iframe{
  border:none;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon/icon.png" alt="logo">
</div>

<!-- APP -->
<div class="app">

  <!-- STOCK -->
  <div class="stock-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
      {
        "symbols":[["ASX:XJO|1D"]],
        "chartOnly":true,
        "colorTheme":"dark",
        "isTransparent":true,
        "autosize":true
      }
      </script>

    </div>

  </div>

  <!-- NEWS -->
  <div class="news-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%"
      }
      </script>

    </div>

  </div>

</div>

<!-- LOADER SCRIPT -->
<script>
window.addEventListener("load", () => {

  setTimeout(() => {

    const loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
    }, 400);

  }, 800);

});
</script>

</body>
</html>
