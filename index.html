<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>
body {
  margin: 0;
  background: #141414;
  color: #d0d0d0;
  font-family: Arial;
}

/* RESET */
* {
  border: none !important;
  outline: none !important;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  height: 100vh;
}

/* PANELS */
.panel {
  background: #141414;
  padding: 12px;
  overflow: hidden;
}

.stack {
  display: grid;
  grid-template-rows: 1fr 1fr;
}

/* =========================
   🍏 DESKTOP LIQUID GLASS NAV (BOTTOM)
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 16px;

  width: 420px;
  height: 64px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  border-radius: 32px;
  overflow: hidden;

  background: rgba(20,20,20,0.35);

  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);

  filter: url(#glass-distortion);

  box-shadow:
    0 10px 35px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* TABS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 18px;
  opacity: 0.55;
  color: #e6e6e6;
}

.tab.active {
  opacity: 1;
}

/* SVG */
svg {
  position: absolute;
  width: 0;
  height: 0;
}

</style>
</head>

<body>

<div class="container">

  <div class="panel">
    <div id="stockContainer"></div>
  </div>

  <div class="panel stack">
    <div id="newsContainer"></div>
    <div id="extraContainer"></div>
  </div>

</div>

<div class="nav">
  <div class="tab">📈 Stock</div>
  <div class="tab">📰 News</div>
</div>

<!-- FILTER -->
<svg>
  <filter id="glass-distortion">
    <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="1" seed="3"/>
    <feGaussianBlur stdDeviation="2.5"/>
    <feDisplacementMap in="SourceGraphic" scale="60"/>
  </filter>
</svg>

</body>
</html>
