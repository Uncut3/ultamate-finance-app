<!DOCTYPE html>
<html>
<head>
<title>AWP Desktop</title>

<style>
body {
  margin: 0;
  background: #05070d;
  color: white;
  font-family: Arial;
}

/* DARK GRID LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  gap: 10px;
  padding: 10px;
  box-sizing: border-box;
}

.panel {
  background: #0b0f1a;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
  margin-top: 0;
  color: #ffffff;
}
</style>
</head>

<body>

<div class="container">

  <!-- STOCK -->
  <div class="panel">
    <h2>ASX 200 (XJO)</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"></script>
  </div>

  <!-- NEWS -->
  <div class="panel">
    <h2>Australia Market News</h2>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"></script>
  </div>

</div>

</body>
</html>
