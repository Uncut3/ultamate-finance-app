<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
<title>XJO Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99999;
  opacity:1;
  transition:opacity .4s ease;
}

.logo{
  width:80px;
  height:80px;
  object-fit:contain;
}

/* PAGES */
.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* STOCK AREA */
#stock{
  position:absolute;
  inset:0;
  padding-bottom:90px;
}

/* IMPORTANT FIX: STABLE CHART OWNERSHIP */
.widget,
.tradingview-widget-container,
.tradingview-widget-container__widget{
  width:100% !important;
  height:100% !important;
}

/* NAV */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:min(420px, 92%);
  height:72px;

  display:flex;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);
  border-radius:30px;
  overflow:hidden;
}

/* PILL */
.pill{
  position:absolute;
  width:33.3%;
  height:100%;
  left:0;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.14);
  transition:transform .35s ease;
}

/* TAB */
.tab{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2;
  cursor:pointer;
}

/* ICON */
.icon img{
  width:22px;
  height:22px;
  object-fit:contain;
}

/* LABEL */
.label{
  font-size:11px;
  margin-top:4px;
}

/* SETTINGS */
.settings{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  padding:14px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);

  border-radius:24px;
  display:none;
}

.settings.show{
  display:block;
}

.row{
  display:flex;
}

.btn{
  flex:1;
  padding:12px;
  text-align:center;
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  margin:5px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon/icon.png">
  <div style="margin-top:10px;font-weight:600;">XJO Status</div>
  <div style="font-size:12px;opacity:.6;margin-top:5px;">Loading market data...</div>
</div>

<!-- STOCK -->
<div class="page active" id="stock">
  <div class="widget">

    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <!-- FIXED: SAFE JSON STRUCTURE -->
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
  "symbols": [
    ["ASX:XJO|1D"]
  ],
  "chartOnly": true,
  "colorTheme": "dark",
  "isTransparent": true,
  "autosize": true
}
      </script>

    </div>

  </div>
</div>

<!-- NEWS -->
<div class="page" id="news">
  <div class="widget">

    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
  "feedMode": "all_symbols",
  "colorTheme": "dark",
  "isTransparent": true,
  "height": "100%",
  "width": "100%"
}
      </script>

    </div>

  </div>
</div>

<!-- NAV -->
<div class="nav">

  <div class="pill" id="pill"></div>

  <div class="tab" onclick="go('stock')">
    <div class="icon"><img src="icon/stock.png"></div>
    <div class="label">Stock</div>
  </div>

  <div class="tab" onclick="toggleSettings()">
    <div class="icon"><img src="icon/settings.png"></div>
    <div class="label">Settings</div>
  </div>

  <div class="tab" onclick="go('news')">
    <div class="icon"><img src="icon/news.png"></div>
    <div class="label">News</div>
  </div>

</div>

<!-- SCRIPT -->
<script>

const pill = document.getElementById("pill");

/* NAV ANIMATION */
function go(page){

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  if(page === "stock") pill.style.transform = "translateX(0%)";
  if(page === "news") pill.style.transform = "translateX(200%)";

  document.getElementById("settingsPanel")?.classList.remove("show");
}

/* SETTINGS */
function toggleSettings(){
  document.getElementById("settingsPanel").classList.toggle("show");
}

/* LOADER (SAFE FIX) */
window.addEventListener("load", () => {

  const loader = document.getElementById("loader");

  setTimeout(() => {
    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
    }, 400);

  }, 800);

});

/* MOBILE ZOOM BLOCK (SAFE) */
document.addEventListener("gesturestart", e => e.preventDefault());

</script>

</body>
</html>
