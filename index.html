<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XJO Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  z-index:99999;
}

/* LOGO */
.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* APP LAYOUT */
.app{
  width:100vw;
  height:100vh;

  position:relative;
  padding:12px;

  display:flex;
  gap:12px;
}

/* STOCK PANEL */
.stock-panel{
  flex:1;
  border-radius:24px;
  overflow:hidden;
  min-width:0;
}

/* NEWS PANEL */
.news-panel{
  width:320px;
  border-radius:20px;
  overflow:hidden;
}

/* FORCE FULL SIZE */
.stock-panel,
.news-panel,
.stock-panel > div,
.news-panel > div,
.tradingview-widget-container{
  width:100% !important;
  height:100% !important;
}

iframe{
  border:none !important;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon/icon.png" alt="Logo">
</div>

<!-- APP -->
<div class="app">

  <!-- STOCK -->
  <div class="stock-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
      {
        "symbols":[["ASX:XJO|1D"]],
        "chartOnly":true,
        "colorTheme":"dark",
        "isTransparent":true,
        "autosize":true
      }
      </script>

    </div>

  </div>

  <!-- NEWS -->
  <div class="news-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%"
      }
      </script>

    </div>

  </div>

</div>

<!-- CONFIG (GLOBAL RULES) -->
<script src="config.js"></script>

</body>
</html>
