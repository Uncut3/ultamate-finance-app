<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP Desktop</title>

<style>

/* =====================================================
   GLOBAL
===================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#141414;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:white;
  overflow:hidden;
}

/* =====================================================
   MAIN LAYOUT (RESET TO DEFAULT)
===================================================== */
.app{

  width:100vw;
  height:100vh;

  display:grid;

  /* chart full, news overlay side */
  grid-template-columns: 1fr;

  padding:12px;

}

/* =====================================================
   PANELS
===================================================== */
.panel{

  position:absolute;

  inset:12px;

  border-radius:24px;

  overflow:hidden;

}

/* =====================================================
   STOCK (FULL SCREEN)
===================================================== */
.stock-panel{
  z-index:1;
}

/* =====================================================
   NEWS (SIDE OVERLAY)
===================================================== */
.news-panel{

  position:absolute;

  top:12px;
  right:12px;

  width:320px;
  height:calc(100vh - 24px);

  z-index:2;

  border-radius:20px;

  overflow:hidden;

  background:#141414;

}

/* =====================================================
   TRADINGVIEW CLEANUP
===================================================== */
iframe{
  border:none !important;
}

/* =====================================================
   SUBTLE GLASS EFFECT
===================================================== */
.panel::before{

  content:"";

  position:absolute;

  inset:0;

  background:rgba(255,255,255,.02);

  pointer-events:none;

}

/* =====================================================
   MAKE NEWS MORE COMPACT
===================================================== */
.news-panel{

  opacity:.95;

  backdrop-filter:blur(12px);

}

</style>
</head>

<body>

<div class="app">

  <!-- =====================================================
       STOCK (RESET FULL SIZE)
  ====================================================== -->
  <div class="panel stock-panel">

    <div class="tradingview-widget-container"
    style="height:100%;width:100%;">

      <div class="tradingview-widget-container__widget"
      style="height:100%;width:100%;"></div>

      <script type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
      async>

      {
        "symbols":[["ASX:XJO|1D"]],
        "chartOnly":false,
        "colorTheme":"dark",
        "isTransparent":true,
        "autosize":true,
        "width":"100%",
        "height":"100%",
        "hideSymbolLogo":false,
        "scalePosition":"right",
        "scaleMode":"Normal",
        "valuesTracking":"1",
        "changeMode":"price-and-percent"
      }

      </script>

    </div>

  </div>

  <!-- =====================================================
       NEWS (FLOATING SIDE PANEL)
  ====================================================== -->
  <div class="panel news-panel">

    <div class="tradingview-widget-container"
    style="height:100%;width:100%;">

      <div class="tradingview-widget-container__widget"
      style="height:100%;width:100%;"></div>

      <script type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
      async>

      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%",
        "locale":"en"
      }

      </script>

    </div>

  </div>

</div>

</body>
</html>
