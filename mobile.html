<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Bottom Nav</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: linear-gradient(135deg, #dbeafe, #fce7f3);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Bottom nav */
  .nav-wrapper {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
  }

  .nav {
    display: flex;
    gap: 28px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .item {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    position: relative;
    color: #666;
    transition: 0.2s;
  }

  .item.active {
    color: #000;
    transform: scale(1.1);
  }

  .item.active::after {
    content: "";
    position: absolute;
    bottom: -4px;
    width: 6px;
    height: 6px;
    background: #000;
    border-radius: 50%;
  }
</style>
</head>

<body>

<div class="content">
  <div>
    <h1>Mobile Version</h1>
    <p>iOS-style bottom navigation</p>
  </div>
</div>

<div class="nav-wrapper">
  <div class="nav">
    <div class="item active" onclick="setActive(this)">🏠</div>
    <div class="item" onclick="setActive(this)">🔍</div>
    <div class="item" onclick="setActive(this)">👤</div>
    <div class="item" onclick="setActive(this)">⚙️</div>
  </div>
</div>

<script>
function setActive(el) {
  document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
