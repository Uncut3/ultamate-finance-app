<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AWP Mobile</title>

<style>
/* =========================
   GLOBAL DARK THEME
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #05070d;
  color: #ffffff;
  overflow: hidden;
}

/* =========================
   MAIN LAYOUT
========================= */
.main {
  height: calc(100vh - 90px);
  position: relative;
  overflow: hidden;
}

/* =========================
   PAGES
========================= */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 10px;
  transform: translateX(100%);
  transition: 0.35s ease;
  overflow-y: auto;
  background: #05070d;
}

.page.active {
  transform: translateX(0);
}

.page.left {
  transform: translateX(-100%);
}

/* =========================
   STOCK / NEWS CONTAINERS
========================= */
#stockContainer,
#newsContainer {
  width: 100%;
  height: 100%;
}

/* =========================
   FLOATING DARK NAV BAR
========================= */
.bottom-nav {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);

  height: 64px;
  width: 85%;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(10, 12, 18, 0.75);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 30px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* NAV ITEMS */
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;

  font-size: 20px;
  opacity: 0.5;
  transition: 0.2s ease;
  cursor: pointer;

  color: #ffffff;
}

.nav-item.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: #cfcfcf;
}

</style>
</head>

<body>

<div class="main">

  <!-- STOCK PAGE -->
  <div id="stockPage" class="page active">
    <div id="stockContainer"></div>
  </div>

  <!-- NEWS PAGE -->
  <div id="newsPage" class="page">
    <div id="newsContainer"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('stock')">
    📈
    <div class="label">Stock</div>
  </div>

  <div class="nav-item" onclick="showPage('news')">
    📰
    <div class="label">News</div>
  </div>
</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

/* PAGE SWITCH */
function showPage(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");

    if (!stockLoaded) loadStock();

  } else {
    news.classList.add("active");
    stock.classList.remove("active");

    if (!newsLoaded) loadNews();
  }

  setTab(page);
}

/* TAB STATE */
function setTab(page) {
  const tabs = document.querySelectorAll(".nav-item");
  tabs.forEach(t => t.classList.remove("active"));

  if (page === "stock") tabs[0].classList.add("active");
  else tabs[1].classList.add("active");
}

/* STOCK (XJO) */
function loadStock() {
  stockLoaded = true;

  const container = document.getElementById("stockContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    colorTheme: "dark",
    autosize: true
  });

  container.appendChild(script);
}

/* NEWS */
function loadNews() {
  newsLoaded = true;

  const container = document.getElementById("newsContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    colorTheme: "dark"
  });

  container.appendChild(script);
}

/* INIT */
loadStock();

</script>

</body>
</html>
