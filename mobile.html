<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AWP Mobile</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #141414;
  color: #d0d0d0;
  overflow: hidden;
}

/* GLOBAL RESET */
* {
  border: none !important;
  outline: none !important;
}

.app {
  position: fixed;
  inset: 0;
  background: #141414;
}

/* SAFE AREA */
.main {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: calc(78px + env(safe-area-inset-bottom));
  overflow: hidden;
  background: #141414;
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  overflow: hidden;
  background: #141414;
}

.page.active {
  transform: translateX(0);
}

/* WIDGET AREA */
.widget {
  width: 100%;
  height: 94%;
  background: #141414;
  opacity: 0.5;
}

/* =========================
   🍏 LIQUID GLASS NAV (MOBILE)
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(12px + env(safe-area-inset-bottom));

  width: 88%;
  height: 68px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  border-radius: 34px;
  overflow: hidden;

  background: rgba(20, 20, 20, 0.35);

  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);

  filter: url(#glass-distortion);

  box-shadow:
    0 10px 35px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* TABS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;
  opacity: 0.55;
  color: #e6e6e6;
  transition: 0.25s ease;
}

.tab.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: rgba(230,230,230,0.6);
}

/* SVG HIDDEN */
svg {
  position: absolute;
  width: 0;
  height: 0;
}

</style>
</head>

<body>

<div class="app">

  <div class="main">

    <div id="stockPage" class="page active">
      <div id="stockContainer" class="widget"></div>
    </div>

    <div id="newsPage" class="page">
      <div id="newsContainer" class="widget"></div>
    </div>

  </div>

  <div class="nav">
    <div class="tab active">📈<div class="label">Stock</div></div>
    <div class="tab">📰<div class="label">News</div></div>
  </div>

</div>

<!-- LIQUID DISTORTION FILTER -->
<svg>
  <filter id="glass-distortion">
    <feTurbulence 
      type="fractalNoise"
      baseFrequency="0.008 0.008"
      numOctaves="1"
      seed="3"
      result="noise"/>
    <feGaussianBlur in="noise" stdDeviation="2.5" result="blur"/>
    <feDisplacementMap 
      in="SourceGraphic"
      in2="blur"
      scale="60"
      xChannelSelector="R"
      yChannelSelector="G"/>
  </filter>
</svg>

</body>
</html>
