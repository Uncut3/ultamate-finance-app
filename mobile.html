<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Site</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: linear-gradient(135deg, #dbeafe, #fce7f3);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-wrapper {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
  }

  .nav {
    display: flex;
    gap: 28px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .item {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    color: #666;
    position: relative;
  }

  .item.active {
    color: #000;
    transform: scale(1.1);
  }

  .item.active::after {
    content: "";
    position: absolute;
    bottom: -4px;
    width: 6px;
    height: 6px;
    background: black;
    border-radius: 50%;
  }
</style>
</head>

<body>

<div class="content">
  <h1>Mobile Site</h1>
</div>

<div class="nav-wrapper">
  <div class="nav">
    <div class="item active">🏠</div>
    <div class="item">🔍</div>
    <div class="item">👤</div>
    <div class="item">⚙️</div>
  </div>
</div>

</body>
</html>
