<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AWP Mobile</title>

<style>
/* =========================
   MONOCHROME DARK THEME
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #000000;
  color: #d0d0d0;
  overflow: hidden;
}

/* =========================
   MAIN LAYOUT
========================= */
.main {
  height: calc(100vh - 90px);
  position: relative;
  overflow: hidden;
}

/* =========================
   PAGES
========================= */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 10px;
  transform: translateX(100%);
  transition: 0.3s ease;
  overflow-y: auto;
  background: #000000;
}

.page.active { transform: translateX(0); }
.page.left { transform: translateX(-100%); }

/* =========================
   NAV BAR (NO BORDERS)
========================= */
.bottom-nav {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);

  height: 64px;
  width: 85%;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(20, 20, 20, 0.65);
  backdrop-filter: blur(20px);

  border-radius: 28px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.8);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;
  opacity: 0.5;
  transition: 0.2s;
  cursor: pointer;
  color: #d0d0d0;
}

.nav-item.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: #9a9a9a;
}

/* REMOVE ALL OUTLINES/BORDERS */
* {
  outline: none !important;
  border: none !important;
}

</style>
</head>

<body>

<div class="main">

  <div id="stockPage" class="page active">
    <div id="stockContainer"></div>
  </div>

  <div id="newsPage" class="page">
    <div id="newsContainer"></div>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('stock')">📈<div class="label">Stock</div></div>
  <div class="nav-item" onclick="showPage('news')">📰<div class="label">News</div></div>
</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

function showPage(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");
    if (!stockLoaded) loadStock();
  } else {
    news.classList.add("active");
    stock.classList.remove("active");
    if (!newsLoaded) loadNews();
  }

  setTab(page);
}

function setTab(page) {
  document.querySelectorAll(".nav-item").forEach(t => t.classList.remove("active"));
  if (page === "stock") document.querySelectorAll(".nav-item")[0].classList.add("active");
  else document.querySelectorAll(".nav-item")[1].classList.add("active");
}

/* STOCK (XJO DARK) */
function loadStock() {
  stockLoaded = true;

  const container = document.getElementById("stockContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    colorTheme: "dark",
    autosize: true
  });

  container.appendChild(script);
}

/* NEWS (DARK) */
function loadNews() {
  newsLoaded = true;

  const container = document.getElementById("newsContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    colorTheme: "dark"
  });

  container.appendChild(script);
}

loadStock();

</script>

</body>
</html>
