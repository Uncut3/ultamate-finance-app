<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AWP</title>

<style>
/* =========================
   GLOBAL DARK SYSTEM
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #000;
  color: #d0d0d0;
  overflow: hidden;
}

/* =========================
   APP WRAPPER
========================= */
.app {
  position: fixed;
  inset: 0;
  background: #000;
}

/* =========================
   PAGE SYSTEM
========================= */
.page {
  position: absolute;
  inset: 0;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  overflow: hidden;
  background: #000;
}

.page.active {
  transform: translateX(0);
}

/* =========================
   FULL SCREEN CONTENT
========================= */
#stockContainer,
#newsContainer {
  width: 100%;
  height: 100%;
}

/* =========================
   BOTTOM NAV (FLOATING GLASS)
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 18px;

  width: 85%;
  height: 64px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(15,15,15,0.75);
  backdrop-filter: blur(25px);

  border-radius: 30px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;
  opacity: 0.5;
  cursor: pointer;
  transition: 0.2s;
  color: #d0d0d0;
}

.tab.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: #9a9a9a;
}

</style>
</head>

<body>

<div class="app">

  <!-- =========================
       STOCK PAGE
  ========================= -->
  <div id="stockPage" class="page active">
    <div id="stockContainer"></div>
  </div>

  <!-- =========================
       NEWS PAGE
  ========================= -->
  <div id="newsPage" class="page">
    <div id="newsContainer"></div>
  </div>

</div>

<!-- =========================
     NAVIGATION
========================= -->
<div class="nav">
  <div class="tab active" onclick="go('stock')">
    📈
    <div class="label">Stock</div>
  </div>

  <div class="tab" onclick="go('news')">
    📰
    <div class="label">News</div>
  </div>
</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

/* =========================
   NAV SWITCH
========================= */
function go(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");

    if (!stockLoaded) loadStock();

  } else {
    news.classList.add("active");
    stock.classList.remove("active");

    if (!newsLoaded) loadNews();
  }

  setTab(page);
}

/* =========================
   TAB UI
========================= */
function setTab(page) {
  const tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => t.classList.remove("active"));

  if (page === "stock") tabs[0].classList.add("active");
  else tabs[1].classList.add("active");
}

/* =========================
   STOCK (XJO)
========================= */
function loadStock() {
  stockLoaded = true;

  const container = document.getElementById("stockContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  container.appendChild(script);
}

/* =========================
   NEWS (FULL SCREEN FIXED)
========================= */
function loadNews() {
  newsLoaded = true;

  const container = document.getElementById("newsContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  container.appendChild(script);
}

/* INIT */
loadStock();

</script>

</body>
</html>
