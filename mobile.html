<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XJO Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}

/* BODY */
body{
  background:#141414;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  opacity:1;
  transition:opacity 0.4s ease;
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* APP LAYOUT */
.app{
  position:absolute;
  inset:0;
  display:flex;
  gap:12px;
  padding:12px;
}

/* STOCK PANEL (IMPORTANT FIX) */
.stock-panel{
  flex:1;
  position:relative;
  border-radius:24px;
  overflow:hidden;
}

/* NEWS PANEL */
.news-panel{
  width:320px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
}

/* 🔥 IMPORTANT: FORCE ABSOLUTE FILL FOR TRADINGVIEW */
.tradingview-widget-container{
  position:absolute;
  inset:0;
}

.tradingview-widget-container__widget{
  position:absolute;
  inset:0;
}

iframe{
  border:none;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon/icon.png" alt="logo">
</div>

<!-- APP -->
<div class="app">

  <!-- STOCK (FIXED) -->
  <div class="stock-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
      {
        "symbols": [
          ["ASX:XJO|1D|AUD"]
        ],
        "chartOnly": false,
        "colorTheme": "dark",
        "isTransparent": true,
        "locale": "en",
        "autosize": true,
        "dateRanges": [
          "1d|1",
          "1m|30",
          "3m|60",
          "12m|1D",
          "60m|1W",
          "all|1M"
        ]
      }
      </script>

    </div>

  </div>

  <!-- NEWS -->
  <div class="news-panel">

    <div class="tradingview-widget-container">

      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%"
      }
      </script>

    </div>

  </div>

</div>

<!-- LOADER SCRIPT -->
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 400);
  }, 800);
});
</script>

</body>
</html>
