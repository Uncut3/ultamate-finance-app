<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XJO Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}

/* BODY */
body{
  background:#141414;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#141414;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  opacity:1;
  transition:opacity 0.4s ease;
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* APP */
.app{
  position:absolute;
  inset:0;
  display:flex;
  gap:12px;
  padding:12px;
}

/* STOCK PANEL */
.stock-panel{
  flex:1;
  position:relative;
  border-radius:24px;
  overflow:hidden;
  background:transparent;
}

/* NEWS PANEL */
.news-panel{
  width:320px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
}

/* FULL FILL FIX */
.finlogix-container,
.tradingview-widget-container{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* REMOVE ANY BACKGROUND BLOCKING */
.finlogix-container{
  background:transparent !important;
}

/* IFRAME SAFETY */
iframe{
  border:none;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img class="logo" src="icon/icon.png" alt="logo">
</div>

<!-- APP -->
<div class="app">

  <!-- STOCK (FINLOGIX) -->
  <div class="stock-panel">

    <div class="finlogix-container"></div>

  </div>

  <!-- NEWS -->
  <div class="news-panel">

    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode":"all_symbols",
        "colorTheme":"dark",
        "isTransparent":true,
        "displayMode":"regular",
        "width":"100%",
        "height":"100%"
      }
      </script>

    </div>

  </div>

</div>

<!-- FINLOGIX SCRIPT -->
<script src="https://widget.finlogix.com/Widget.js"></script>

<script>
window.addEventListener("load", () => {

  setTimeout(() => {

    if (typeof Widget !== "undefined") {
      Widget.init({
        widgetId: "c75665fd-d8fc-4f46-a5be-6ea596ba64c7",
        type: "SymbolChartList",
        language: "en",
        symbolIds: [5,19,44,547,554,129,157],

        isAdaptive: true,

        // 🔥 IMPORTANT FIXES
        withBorderBox: false,
        isTransparent: true
      });
    }

  }, 300);

  // loader fade
  const loader = document.getElementById("loader");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 400);
  }, 800);

});
</script>

</body>
</html>
