<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AWP Mobile</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
  overflow: hidden;
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ===== SIDEBAR (LIQUID GLASS) ===== */
.sidebar {
  width: 80px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.tab {
  margin: 20px 0;
  padding: 10px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.3s;
  opacity: 0.6;
}

.tab.active {
  background: rgba(255,255,255,0.15);
  opacity: 1;
}

/* ===== MAIN AREA ===== */
.main {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* ===== PAGE CONTAINERS ===== */
.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 10px;
  transform: translateX(100%);
  transition: transform 0.4s ease;
  overflow-y: auto;
}

.page.active {
  transform: translateX(0);
}

.page.left {
  transform: translateX(-100%);
}

/* ===== STOCK PAGE ===== */
#stockContainer {
  height: 100%;
}

/* ===== NEWS PAGE ===== */
.newsItem {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="tab active" onclick="showPage('stock')">📈</div>
    <div class="tab" onclick="showPage('news')">📰</div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">

    <!-- ===== STOCK PAGE ===== -->
    <div id="stockPage" class="page active">

      <div id="stockContainer">
        <!-- TradingView Widget WILL LOAD HERE -->
      </div>

    </div>

    <!-- ===== NEWS PAGE ===== -->
    <div id="newsPage" class="page">

      <h3>🇦🇺 Australia Market News</h3>

      <div id="newsContainer">
        <!-- TradingView News Widget WILL LOAD HERE -->
      </div>

    </div>

  </div>
</div>

<script>
let currentPage = "stock";
let stockLoaded = false;
let newsLoaded = false;

/* ===== PAGE SWITCHING (SLIDE C STYLE) ===== */
function showPage(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");
    news.classList.add("left");
    stock.classList.remove("left");
    document.querySelectorAll(".tab")[0].classList.add("active");

    if (!stockLoaded) loadStockWidget();

  } else {
    news.classList.add("active");
    stock.classList.remove("active");
    stock.classList.add("left");
    news.classList.remove("left");
    document.querySelectorAll(".tab")[1].classList.add("active");

    if (!newsLoaded) loadNewsWidget();
  }

  currentPage = page;
}

/* ===== STOCK WIDGET (XJO) ===== */
function loadStockWidget() {
  stockLoaded = true;

  const container = document.getElementById("stockContainer");

  container.innerHTML = `
    <div class="tradingview-widget-container">
      <div id="tv-stock"></div>
    </div>
  `;

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    symbols: [
      ["ASX:XJO|1D"]
    ],
    chartOnly: true,
    width: "100%",
    height: "100%",
    locale: "en",
    colorTheme: "dark",
    autosize: true
  });

  container.appendChild(script);
}

/* ===== NEWS WIDGET (AUSTRALIA ONLY) ===== */
function loadNewsWidget() {
  newsLoaded = true;

  const container = document.getElementById("newsContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    feedMode: "all_symbols",
    isTransparent: false,
    displayMode: "regular",
    width: "100%",
    height: "100%",
    colorTheme: "dark",
    locale: "en"
  });

  container.appendChild(script);
}

/* ===== INIT ===== */
loadStockWidget();

</script>

</body>
</html>
