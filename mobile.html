<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AWP Mobile</title>

<style>

/* =========================================================
   GLOBAL
========================================================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  border:none;
  outline:none;
}

body{
  background:#141414;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* =========================================================
   APP
========================================================= */
.app{
  position:fixed;
  inset:0;
  background:#141414;
}

/* =========================================================
   MAIN
========================================================= */
.main{
  position:fixed;
  inset:0;

  bottom:calc(82px + env(safe-area-inset-bottom));

  overflow:hidden;
}

/* =========================================================
   PAGES
========================================================= */
.page{
  position:absolute;
  inset:0;

  opacity:0;
  pointer-events:none;

  transition:opacity .25s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* =========================================================
   WIDGET AREA
========================================================= */
.widget{
  width:100%;
  height:100%;
  overflow:hidden;

  background:#141414;

  opacity:.55;
}

iframe{
  border:none !important;
}

/* =========================================================
   🍏 NAVIGATION BAR
========================================================= */
.nav{
  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:calc(14px + env(safe-area-inset-bottom));

  width:88%;
  height:72px;

  display:flex;
  align-items:center;

  gap:.5em;

  padding:.5em;

  border-radius:30px;

  background:rgba(255,255,255,.05);

  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  box-shadow:
    inset 0 0 8px rgba(255,255,255,.03),
    0 10px 30px rgba(0,0,0,.55);

  overflow:hidden;

  z-index:9999;
}

/* =========================================================
   ACTIVE BUBBLE
========================================================= */
.active-pill{
  position:absolute;

  left:8px;

  width:calc(50% - 8px);
  height:56px;

  border-radius:22px;

  /* soft white */
  background:rgba(255,255,255,.06);

  /* faded white outline */
  border:1px solid rgba(255,255,255,.14);

  /* soft glow */
  box-shadow:
    inset 0 0 8px rgba(255,255,255,.04);

  transition:
    transform .35s cubic-bezier(.22,1,.36,1);

  z-index:0;
}

/* animation */
.active-pill.news{
  transform:translateX(100%);
}

/* =========================================================
   TABS
========================================================= */
.tab{
  flex:1;

  height:100%;

  position:relative;
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  border-radius:22px;

  color:rgba(255,255,255,.6);

  transition:
    transform .22s ease,
    color .22s ease;

  user-select:none;
}

.tab.active{
  color:white;
}

.tab:active{
  transform:scale(.96);
}

/* =========================================================
   ICON
========================================================= */
.icon{
  font-size:22px;

  transition:
    transform .25s ease;
}

.tab.active .icon{
  transform:
    translateY(-1px)
    scale(1.08);
}

/* =========================================================
   LABEL
========================================================= */
.label{
  margin-top:4px;
  font-size:11px;
}

</style>
</head>

<body>

<div class="app">

  <div class="main">

    <!-- =========================================================
         STOCK PAGE
    ========================================================== -->
    <div class="page active" id="stockPage">

      <div class="widget">

        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height:100%;width:100%;">
          <div class="tradingview-widget-container__widget" style="height:100%;width:100%;"></div>

          <script type="text/javascript"
          src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
          async>
          {
            "symbols": [
              [
                "ASX:XJO|1D"
              ]
            ],
            "chartOnly": true,
            "width": "100%",
            "height": "100%",
            "locale": "en",
            "colorTheme": "dark",
            "autosize": true,
            "showVolume": false,
            "showMA": false,
            "hideDateRanges": false,
            "hideMarketStatus": false,
            "hideSymbolLogo": true,
            "scalePosition": "right",
            "scaleMode": "Normal",
            "fontFamily": "-apple-system, BlinkMacSystemFont, sans-serif",
            "fontSize": "10",
            "noTimeScale": false,
            "valuesTracking": "1",
            "changeMode": "price-and-percent",
            "chartType": "area",
            "lineWidth": 2
          }
          </script>
        </div>
        <!-- TradingView Widget END -->

      </div>

    </div>

    <!-- =========================================================
         NEWS PAGE
    ========================================================== -->
    <div class="page" id="newsPage">

      <div class="widget">

        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height:100%;width:100%;">
          <div class="tradingview-widget-container__widget" style="height:100%;width:100%;"></div>

          <script type="text/javascript"
          src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
          async>
          {
            "feedMode": "all_symbols",
            "isTransparent": true,
            "displayMode": "regular",
            "width": "100%",
            "height": "100%",
            "colorTheme": "dark",
            "locale": "en"
          }
          </script>
        </div>
        <!-- TradingView Widget END -->

      </div>

    </div>

  </div>

  <!-- =========================================================
       🍏 NAVIGATION BAR
  ========================================================== -->
  <div class="nav">

    <!-- active bubble -->
    <div class="active-pill" id="pill"></div>

    <!-- STOCK -->
    <div
      class="tab active"
      id="stockTab"
      onclick="switchPage('stock')"
    >

      <div class="icon">📈</div>
      <div class="label">Stock</div>

    </div>

    <!-- NEWS -->
    <div
      class="tab"
      id="newsTab"
      onclick="switchPage('news')"
    >

      <div class="icon">📰</div>
      <div class="label">News</div>

    </div>

  </div>

</div>

<script>

/* =========================================================
   PAGE SWITCHING
========================================================= */
function switchPage(page){

  const stockPage=document.getElementById("stockPage");
  const newsPage=document.getElementById("newsPage");

  const stockTab=document.getElementById("stockTab");
  const newsTab=document.getElementById("newsTab");

  const pill=document.getElementById("pill");

  stockTab.classList.remove("active");
  newsTab.classList.remove("active");

  if(page==="stock"){

    stockPage.classList.add("active");
    newsPage.classList.remove("active");

    stockTab.classList.add("active");

    pill.classList.remove("news");

  }

  else{

    newsPage.classList.add("active");
    stockPage.classList.remove("active");

    newsTab.classList.add("active");

    pill.classList.add("news");

  }

}

</script>

</body>
</html>
