<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>XJO status</title>

<style>

.icon img{
  width:22px;
  height:22px;
  object-fit:contain;
}

#loader{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99999;

  /* this is what makes the fade work */
  opacity:1;
  transition:opacity 0.4s ease;
}

.logo{
  width:80px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

.title{
  font-size:20px;
  font-weight:600;
  letter-spacing:1px;
}

.subtitle{
  font-size:12px;
  opacity:0.6;
  margin-top:6px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#141414;
  --glass:rgba(255,255,255,.05);
  --text:#fff;
  --bubble:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.14);
}

body.light{
  --bg:#f2f2f2;
  --glass:rgba(255,255,255,.6);
  --text:#111;
  --bubble:rgba(0,0,0,.06);
  --border:rgba(0,0,0,.12);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

/* MAIN */
.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* WIDGET */
.widget{
  width:100%;
  height:100%;
}

/* NAV */
.nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:72px;
  display:flex;
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-radius:30px;
  overflow:hidden;
}

/* BUBBLE (FIXED) */
.pill{
  position:absolute;
  width:33.3%;
  height:100%;
  background:var(--bubble);
  border:1px solid var(--border);
  transition:transform .35s ease;
  left:0;
}

/* TABS */
.tab{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2;
  cursor:pointer;
}

#stock{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  bottom:100px; /* space for nav */
}

.icon{font-size:20px;}
.label{font-size:11px;}

/* SETTINGS PANEL */
.settings{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  padding:14px;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border-radius:24px;
  display:none;
}

.settings.show{display:block;}

.btn{
  flex:1;
  padding:12px;
  text-align:center;
  background:var(--bubble);
  border-radius:14px;
  margin:5px;
}

.row{display:flex;}

</style>
</head>

<body>


<div id="loader">
  <img class="logo" src="icon.png" alt="XJO Status Logo"/>
  <div class="title">XJO Status</div>
  <div class="subtitle">Loading market data...</div>
</div>

<!-- STOCK -->
<div class="page active" id="stock">
<div class="widget">
<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
"symbols":[["ASX:XJO|1D"]],
"chartOnly":true,
"colorTheme":"dark",
"isTransparent":true,
"autosize": true,
"height": "100%",
"width": "100%"
}
</script>

</div>
</div>
</div>

<!-- NEWS -->
<div class="page" id="news">
<div class="widget">
<div class="tradingview-widget-container" style="height:100%;width:100%;">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
{
"feedMode":"all_symbols",
"colorTheme":"dark",
"isTransparent":true,
"height":"100%",
"width":"100%"
}
</script>

</div>
</div>
</div>

<!-- SETTINGS -->
<div class="settings" id="settingsPanel">
<div class="row">
<div class="btn" onclick="dark()">Dark</div>
<div class="btn" onclick="light()">Light</div>
</div>
</div>

<!-- NAV -->
<!-- NAV -->
<div class="nav">

  <div class="pill" id="pill"></div>

<div class="tab" onmouseenter="hoverTab(0)" onclick="go('stock')">
  <div class="icon">
    <img src="icons/stock.png" alt="Stock">
  </div>
  <div class="label">Stock</div>
</div>

<div class="tab" onmouseenter="hoverTab(1)" onclick="toggleSettings()">
  <div class="icon">
    <img src="icons/settings.png" alt="Settings">
  </div>
  <div class="label">Settings</div>
</div>

<div class="tab" onmouseenter="hoverTab(2)" onclick="go('news')">
  <div class="icon">
    <img src="icons/news.png" alt="News">
  </div>
  <div class="label">News</div>
</div>

<script>

const pill = document.getElementById("pill");

function hoverTab(i){
  pill.style.transform = `translateX(${i * 100}%)`;
}

function go(page){

document.getElementById("stock").classList.remove("active");
document.getElementById("news").classList.remove("active");

document.getElementById(page).classList.add("active");

if(page === "stock") hoverTab(0);
if(page === "news") hoverTab(2);

document.getElementById("settingsPanel").classList.remove("show");

}

function toggleSettings(){
document.getElementById("settingsPanel").classList.toggle("show");
}

function dark(){
document.body.classList.remove("light");
}

function light(){
document.body.classList.add("light");
}

window.addEventListener("load", () => {
  setTimeout(() => {
    const loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
    }, 400);

  }, 800);
});

</script>

</body>
</html>
