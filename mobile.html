<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AWP Mobile</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #141414;
  color: #d0d0d0;
  overflow: hidden;
}

/* GLOBAL RESET */
* {
  border: none !important;
  outline: none !important;
}

.app {
  position: fixed;
  inset: 0;
  background: #141414;
}

/* SAFE AREA */
.main {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: calc(78px + env(safe-area-inset-bottom));
  overflow: hidden;
  background: #141414;
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  overflow: hidden;
  background: #141414;
}

.page.active {
  transform: translateX(0);
}

/* WIDGETS */
.widget {
  width: 100%;
  height: 94%;
  background: #141414;
  opacity: 0.5;
}

/* =========================
   🍏 LIQUID GLASS NAV BAR
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);

  bottom: calc(12px + env(safe-area-inset-bottom));

  width: 88%;
  height: 68px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  /* GLASS EFFECT */
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);

  border-radius: 34px;

  /* SOFT DEPTH (NOT BORDER) */
  box-shadow:
    0 8px 30px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* NAV ITEMS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;

  opacity: 0.55;
  cursor: pointer;
  transition: 0.25s ease;

  color: #e6e6e6;
}

.tab.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: rgba(230,230,230,0.65);
}

</style>
</head>

<body>

<div class="app">

  <div class="main">

    <div id="stockPage" class="page active">
      <div id="stockContainer" class="widget"></div>
    </div>

    <div id="newsPage" class="page">
      <div id="newsContainer" class="widget"></div>
    </div>

  </div>

  <!-- 🍏 GLASS NAV -->
  <div class="nav">
    <div class="tab active" onclick="go('stock')">📈<div class="label">Stock</div></div>
    <div class="tab" onclick="go('news')">📰<div class="label">News</div></div>
  </div>

</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

function go(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");
    if (!stockLoaded) loadStock();
  } else {
    news.classList.add("active");
    stock.classList.remove("active");
    if (!newsLoaded) loadNews();
  }

  setTab(page);
}

function setTab(page) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (page === "stock") document.querySelectorAll(".tab")[0].classList.add("active");
  else document.querySelectorAll(".tab")[1].classList.add("active");
}

function loadStock() {
  stockLoaded = true;

  const c = document.getElementById("stockContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

function loadNews() {
  newsLoaded = true;

  const c = document.getElementById("newsContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

loadStock();

</script>

</body>
</html>
