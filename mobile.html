<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AWP Mobile</title>

<style>
/* =========================
   GLOBAL
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #0b0f1a;
  color: white;
  overflow: hidden;
}

/* =========================
   APP LAYOUT
========================= */
.app {
  height: 100vh;
  width: 100vw;
}

/* MAIN CONTENT AREA */
.main {
  height: calc(100vh - 70px); /* space for bottom nav */
  position: relative;
  overflow: hidden;
}

/* =========================
   PAGES
========================= */
.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 10px;

  transform: translateX(100%);
  transition: transform 0.35s ease;
  overflow-y: auto;
}

.page.active {
  transform: translateX(0);
}

.page.left {
  transform: translateX(-100%);
}

/* =========================
   STOCK PAGE
========================= */
#stockContainer {
  width: 100%;
  height: 100%;
}

/* =========================
   NEWS PAGE
========================= */
#newsContainer {
  width: 100%;
}

/* =========================
   BOTTOM NAV (iOS STYLE)
========================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  height: 70px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(20, 20, 20, 0.6);
  backdrop-filter: blur(20px);

  border-top: 1px solid rgba(255,255,255,0.08);

  padding-bottom: env(safe-area-inset-bottom);
}

/* NAV ITEM */
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;

  font-size: 20px;
  opacity: 0.5;
  transition: 0.25s;
  cursor: pointer;
}

/* ACTIVE TAB */
.nav-item.active {
  opacity: 1;
  transform: translateY(-2px);
}

/* LABEL */
.label {
  font-size: 10px;
  margin-top: 2px;
  color: white;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="app">

  <!-- =========================
       MAIN CONTENT
  ========================= -->
  <div class="main">

    <!-- STOCK PAGE -->
    <div id="stockPage" class="page active">
      <div id="stockContainer"></div>
    </div>

    <!-- NEWS PAGE -->
    <div id="newsPage" class="page">
      <div id="newsContainer"></div>
    </div>

  </div>

  <!-- =========================
       BOTTOM NAVIGATION
  ========================= -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showPage('stock')">
      📈
      <div class="label">Stock</div>
    </div>

    <div class="nav-item" onclick="showPage('news')">
      📰
      <div class="label">News</div>
    </div>
  </div>

</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

/* =========================
   PAGE SWITCHING
========================= */
function showPage(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");
    news.classList.add("left");
    stock.classList.remove("left");

    if (!stockLoaded) loadStockWidget();

  } else {
    news.classList.add("active");
    stock.classList.remove("active");
    stock.classList.add("left");
    news.classList.remove("left");

    if (!newsLoaded) loadNewsWidget();
  }

  setActiveTab(page);
}

/* =========================
   ACTIVE TAB UI
========================= */
function setActiveTab(page) {
  const tabs = document.querySelectorAll(".nav-item");
  tabs.forEach(t => t.classList.remove("active"));

  if (page === "stock") {
    tabs[0].classList.add("active");
  } else {
    tabs[1].classList.add("active");
  }
}

/* =========================
   STOCK WIDGET (XJO)
========================= */
function loadStockWidget() {
  stockLoaded = true;

  const container = document.getElementById("stockContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    symbols: [
      ["ASX:XJO|1D"]
    ],
    chartOnly: true,
    width: "100%",
    height: "100%",
    locale: "en",
    colorTheme: "dark",
    autosize: true
  });

  container.appendChild(script);
}

/* =========================
   NEWS WIDGET (AU MARKET)
========================= */
function loadNewsWidget() {
  newsLoaded = true;

  const container = document.getElementById("newsContainer");

  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  script.async = true;

  script.innerHTML = JSON.stringify({
    feedMode: "all_symbols",
    displayMode: "regular",
    width: "100%",
    height: "100%",
    colorTheme: "dark",
    locale: "en"
  });

  container.appendChild(script);
}

/* =========================
   INIT
========================= */
loadStockWidget();

</script>

</body>
</html>
