<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AWP Mobile</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #141414;
  overflow: hidden;
}

* {
  border: none !important;
  outline: none !important;
}

.app {
  position: fixed;
  inset: 0;
  background: #141414;
}

.main {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: calc(78px + env(safe-area-inset-bottom));
  overflow: hidden;
}

.page {
  position: absolute;
  inset: 0;
  transform: translateX(100%);
  transition: 0.3s ease;
  background: #141414;
}

.page.active {
  transform: translateX(0);
}

.widget {
  width: 100%;
  height: 94%;
  opacity: 0.5;
}

/* =========================
   🍏 GLASS NAV (YOUR STYLE FIXED)
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);

  bottom: calc(14px + env(safe-area-inset-bottom));

  width: 88%;
  height: 68px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  border-radius: 28px;

  /* FIXED FROM YOUR SOURCE */
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(20,20,20,0.35);

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.05),
    0 10px 30px rgba(0,0,0,0.6);
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;
  opacity: 0.55;
  color: #e6e6e6;
}

.tab.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: rgba(230,230,230,0.6);
}

</style>
</head>

<body>

<div class="app">

  <div class="main">

    <div id="stockPage" class="page active">
      <div id="stockContainer" class="widget"></div>
    </div>

    <div id="newsPage" class="page">
      <div id="newsContainer" class="widget"></div>
    </div>

  </div>

  <div class="nav">
    <div class="tab active">📈<div class="label">Stock</div></div>
    <div class="tab">📰<div class="label">News</div></div>
  </div>

</div>

</body>
</html>
