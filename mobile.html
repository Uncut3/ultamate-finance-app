<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AWP Mobile</title>

<style>
/* =========================
   GLOBAL
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #000;
  color: #d0d0d0;
}

/* =========================
   APP WRAPPER
========================= */
.app {
  position: fixed;
  inset: 0;
  background: #000;
}

/* =========================
   SAFE LAYOUT FIX (IMPORTANT)
========================= */
.main {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

  /* THIS IS THE REAL FIX */
  bottom: calc(80px + env(safe-area-inset-bottom));

  overflow: hidden;
}

/* =========================
   PAGES
========================= */
.page {
  position: absolute;
  inset: 0;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  overflow: hidden;
  background: #000;
}

.page.active {
  transform: translateX(0);
}

/* =========================
   FULL WIDGET AREA
========================= */
#stockContainer,
#newsContainer {
  width: 100%;
  height: 100%;
}

/* =========================
   NAVIGATION (FLOATING)
========================= */
.nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);

  bottom: calc(18px + env(safe-area-inset-bottom));

  width: 85%;
  height: 64px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(15,15,15,0.78);
  backdrop-filter: blur(25px);

  border-radius: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.85);
}

/* NAV ITEMS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;

  font-size: 20px;
  opacity: 0.5;
  transition: 0.2s;
  cursor: pointer;
  color: #d0d0d0;
}

.tab.active {
  opacity: 1;
  transform: translateY(-2px);
}

.label {
  font-size: 10px;
  margin-top: 2px;
  color: #9a9a9a;
}

</style>
</head>

<body>

<div class="app">

  <div class="main">

    <!-- STOCK -->
    <div id="stockPage" class="page active">
      <div id="stockContainer"></div>
    </div>

    <!-- NEWS -->
    <div id="newsPage" class="page">
      <div id="newsContainer"></div>
    </div>

  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="tab active" onclick="go('stock')">📈<div class="label">Stock</div></div>
    <div class="tab" onclick="go('news')">📰<div class="label">News</div></div>
  </div>

</div>

<script>

let stockLoaded = false;
let newsLoaded = false;

/* PAGE SWITCH */
function go(page) {
  const stock = document.getElementById("stockPage");
  const news = document.getElementById("newsPage");

  if (page === "stock") {
    stock.classList.add("active");
    news.classList.remove("active");
    if (!stockLoaded) loadStock();
  } else {
    news.classList.add("active");
    stock.classList.remove("active");
    if (!newsLoaded) loadNews();
  }

  setTab(page);
}

/* TAB UI */
function setTab(page) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (page === "stock") document.querySelectorAll(".tab")[0].classList.add("active");
  else document.querySelectorAll(".tab")[1].classList.add("active");
}

/* STOCK */
function loadStock() {
  stockLoaded = true;

  const c = document.getElementById("stockContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    symbols: [["ASX:XJO|1D"]],
    chartOnly: true,
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

/* NEWS */
function loadNews() {
  newsLoaded = true;

  const c = document.getElementById("newsContainer");

  const s = document.createElement("script");
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-timeline.js";
  s.async = true;

  s.innerHTML = JSON.stringify({
    displayMode: "regular",
    width: "100%",
    height: "100%",
    autosize: true,
    colorTheme: "dark"
  });

  c.appendChild(s);
}

loadStock();

</script>

</body>
</html>
